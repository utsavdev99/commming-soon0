<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPN 24/7</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    background: linear-gradient(135deg,#020617,#001f4d,#2b0000);
    overflow:hidden;
    color:white;
}

/* 🎬 FLASH */
.flash{
    position:fixed;
    width:100%;
    height:100%;
    background:white;
    z-index:999;
    animation:flashOut 1.2s ease forwards;
}
@keyframes flashOut{
    to{opacity:0;visibility:hidden;}
}

/* 🖼 BACKGROUND LOGO */
.bg-logo{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:0;
    pointer-events:none;
}
.bg-logo img{
    width:700px;
    opacity:0.08;
    filter:blur(2px);
    animation:bgFloat 6s ease-in-out infinite;
}
@keyframes bgFloat{
    0%,100%{transform:translate(-50%,-50%) scale(1);}
    50%{transform:translate(-50%,-53%) scale(1.05);}
}

/* 🧭 HEADER */
header{
    position:fixed;
    width:100%;
    top:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 40px;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(255,255,255,0.1);
    z-index:3;
}
.logo img{height:40px;}

nav{
    display:flex;
    gap:25px;
}
nav a{
    color:white;
    text-decoration:none;
    position:relative;
}
nav a::after{
    content:"";
    position:absolute;
    width:0%;
    height:2px;
    bottom:-5px;
    left:0;
    background:red;
    transition:0.3s;
}
nav a:hover::after{width:100%;}
.live{color:red;font-weight:bold;}

/* 🎯 CENTER */
.container{
    position:relative;
    z-index:2;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* CENTER LOGO */
.center-logo{
    margin-bottom:30px;
    opacity:0;
    transform:scale(0.8);
    animation:logoIn 1s ease forwards;
    animation-delay:0.6s;
}
.center-logo img{width:180px;}

@keyframes logoIn{
    to{opacity:1;transform:scale(1);}
}

/* TEXT */
.text{
    display:flex;
    gap:20px;
    font-size:clamp(60px,10vw,150px);
    font-weight:900;
}

/* LETTER */
.word span{
    display:inline-block;
    opacity:0;
    transform:translateY(120px) scale(0.8);
    background:linear-gradient(180deg,#fff,#ccc);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ENTRY */
@keyframes rise{
    60%{transform:translateY(-10px) scale(1.05);}
    100%{opacity:1;transform:translateY(0) scale(1);}
}

/* GLOW BURST */
@keyframes glowBurst{
    50%{text-shadow:0 0 20px red,0 0 40px blue;}
}

/* 🔥 VOWEL EFFECT */
@keyframes vowelPulse{
    0%,100%{
        transform:translateY(0) scale(1);
        text-shadow:0 0 5px white;
    }
    50%{
        transform:translateY(-12px) scale(1.15);
        text-shadow:0 0 20px red,0 0 40px blue;
    }
}

/* HOVER */
.word span:hover{
    transform:translateY(-20px) scale(1.2);
    text-shadow:0 0 20px red,0 0 40px blue;
    transition:0.3s;
}

/* 📱 MOBILE */
@media(max-width:768px){
    nav{display:none;}
    .center-logo img{width:130px;}
    .bg-logo img{width:400px;}
}
</style>
</head>

<body>

<!-- FLASH -->
<div class="flash"></div>

<!-- BACKGROUND LOGO -->
<div class="bg-logo">
    <img src="logo.png" alt="IPN">
</div>

<!-- HEADER -->
<header>
    <div class="logo">
        <img src="logo.png">
    </div>

    <nav>
        <a href="#">HOME</a>
        <a href="#">INDIA</a>
        <a href="#">WORLD</a>
        <a href="#">POLITICS</a>
        <a href="#">BUSINESS</a>
        <a href="#">TECH</a>
        <a href="#">SPORTS</a>
        <a href="#" class="live">LIVE TV</a>
    </nav>
</header>

<!-- CENTER -->
<div class="container">

    <div class="center-logo">
        <img src="logo.png">
    </div>

    <div class="text">
        <div class="word" id="coming"></div>
        <div class="word" id="soon"></div>
    </div>

</div>

<script>
// 🎬 CINEMATIC + VOWEL EFFECT
function animateWord(id, word, delayStart=0){
    const el = document.getElementById(id);
    const vowels = "aeiouAEIOU";

    word.split("").forEach((char,i)=>{
        let span = document.createElement("span");
        span.innerText = char;

        let baseDelay = delayStart + i*0.08;

        span.style.animation = `rise 0.7s cubic-bezier(.2,.8,.2,1) forwards`;
        span.style.animationDelay = baseDelay + "s";

        // 🔥 vowel effect
        if(vowels.includes(char)){
            span.style.animation += `, vowelPulse 2s ease-in-out ${baseDelay+0.5}s infinite`;
        }

        // glow burst on last letter
        if(i === word.length-1){
            span.style.animation += `, glowBurst 0.8s ease ${baseDelay+0.3}s`;
        }

        el.appendChild(span);
    });
}

animateWord("coming","Coming",0.5);
animateWord("soon","Soon",1.2);
</script>

</body>
</html>
